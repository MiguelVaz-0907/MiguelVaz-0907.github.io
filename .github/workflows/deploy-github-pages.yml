# Build + deploy do site estático para GitHub Pages.
# 1. Repositório → Settings → Pages → Source: GitHub Actions
# 2. Copie do .env as variáveis VITE_* para: Settings → Secrets and variables → Actions → Secrets
# 3. Site de utilizador (user.github.io): deixe VITE_BASE_URL vazio ou "/" (variável opcional).
#    Site de projeto (user.github.io/nome-do-repo): crie uma variable VITE_BASE_URL = /nome-do-repo/
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PIX_KEY: ${{ secrets.VITE_PIX_KEY }}
          VITE_PIX_MERCHANT_NAME: ${{ secrets.VITE_PIX_MERCHANT_NAME }}
          VITE_PIX_MERCHANT_CITY: ${{ secrets.VITE_PIX_MERCHANT_CITY }}
          VITE_PIX_MODE: ${{ secrets.VITE_PIX_MODE }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
